<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DanSells | Service Qualifier</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XZL1RF6SV6"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XZL1RF6SV6');</script>
</head>
<body><div class="app"><div class="shell">
  <div class="topbar">
    <div class="brand"><span class="brand-name">DanSells</span><span class="brand-sub">Service Qualifier</span></div>
    <div class="meta"><span>Step 1 of 7</span></div>
  </div>
  <div class="step-wrap">
    <div class="progress-bar"><div class="progress-fill" style="width:14%"></div></div>
    <div class="step-kicker">Let's start simple</div>
    <h2>How open are you to the idea of changing your BMW?</h2>
    <p class="step-desc">Completely honest is best — this just means when we do speak, I am already pointing you in the right direction rather than starting from scratch.</p>
    <div class="choices" id="choices">
      <button class="choice" data-val="Very open — I've been thinking about it" onclick="pick(this)">
        <span class="choice-emoji">🔥</span>
        <span class="choice-title">Very open</span>
        <span class="choice-sub">I have been thinking about it</span>
      </button>
      <button class="choice" data-val="Open but no urgency" onclick="pick(this)">
        <span class="choice-emoji">👍</span>
        <span class="choice-title">Open but no rush</span>
        <span class="choice-sub">Would consider the right deal</span>
      </button>
      <button class="choice" data-val="Curious — just want to know what's possible" onclick="pick(this)">
        <span class="choice-emoji">🤔</span>
        <span class="choice-title">Just curious</span>
        <span class="choice-sub">Want to know what is possible</span>
      </button>
      <button class="choice" data-val="Not really — happy with my current car" onclick="pick(this)">
        <span class="choice-emoji">😌</span>
        <span class="choice-title">Happy as I am</span>
        <span class="choice-sub">Not actively looking</span>
      </button>
    </div>
  </div>
</div></div>
<script>
  function pick(btn){
    document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");
    sessionStorage.setItem("sqOpenness", btn.dataset.val);
    setTimeout(()=>location.href="sq2.html",320);
  }
</script>
</body></html>
