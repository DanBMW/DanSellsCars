<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DanSells | Service Qualifier</title>
  <link rel="stylesheet" href="style.css"/>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XZL1RF6SV6"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XZL1RF6SV6');</script>
</head>
<body><div class="app"><div class="shell">
  <div class="topbar">
    <div class="brand"><span class="brand-name">DanSells</span><span class="brand-sub">Service Qualifier</span></div>
    <div class="meta"><span>Step 7 of 7</span></div>
  </div>
  <div class="step-wrap">
    <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
    <div class="step-kicker">Last step</div>
    <h2>Just your name and best contact.</h2>
    <p class="step-desc">This goes directly to me — no one else. I will use it to follow up in whatever way suits you best.</p>
    <div style="display:grid;gap:14px;margin-bottom:20px;">
      <div class="two-col">
        <div class="field-group"><label>First name *</label><input id="sqFirst" type="text" placeholder="First name"/></div>
        <div class="field-group"><label>Last name *</label><input id="sqLast" type="text" placeholder="Last name"/></div>
      </div>
      <div class="field-group"><label>Mobile *</label><input id="sqPhone" type="tel" placeholder="07..."/></div>
      <div class="field-group"><label>Email (optional)</label><input id="sqEmail" type="email" placeholder="you@example.com"/></div>
      <div class="tick-box">✔ Your details are shared only with Dan and used only to follow up on your enquiry.</div>
      <button class="btn" style="width:100%;" onclick="submit()">Send to Dan</button>
    </div>
  </div>
</div></div>
<script>
  async function submit(){
    const first = document.getElementById("sqFirst").value.trim();
    const last = document.getElementById("sqLast").value.trim();
    const phone = document.getElementById("sqPhone").value.trim();
    if(!first||!last||!phone){ alert("Please add your name and mobile to continue."); return; }

    sessionStorage.setItem("sqFirst", first);
    sessionStorage.setItem("sqLast", last);
    sessionStorage.setItem("sqPhone", phone);
    sessionStorage.setItem("sqEmail", document.getElementById("sqEmail").value.trim());

    const payload = {
      _subject: "Service Qualifier — " + first + " " + last,
      _replyto: document.getElementById("sqEmail").value.trim()||"noreply@dan-sells.co.uk",
      lead_type: "Service Customer Qualifier",
      name: first + " " + last,
      phone: phone,
      email: document.getElementById("sqEmail").value.trim(),
      openness: sessionStorage.getItem("sqOpenness")||"",
      model_interest: sessionStorage.getItem("sqModel")||"",
      timing: sessionStorage.getItem("sqTiming")||"",
      payment_method: sessionStorage.getItem("sqPayment")||"",
      monthly_budget: sessionStorage.getItem("sqMonthly")||"",
      total_budget: sessionStorage.getItem("sqTotal")||"",
      deposit: sessionStorage.getItem("sqDeposit")||"",
      part_exchange: sessionStorage.getItem("sqPX")||"No",
      px_reg: sessionStorage.getItem("sqPXReg")||"",
      px_mileage: sessionStorage.getItem("sqPXMileage")||"",
      px_finance: sessionStorage.getItem("sqPXFinance")||"",
      px_condition: sessionStorage.getItem("sqPXCondition")||"",
      px_service_history: sessionStorage.getItem("sqPXService")||"",
      px_wbac_quote: sessionStorage.getItem("sqPXWBAC")||""
    };

    try{
      await fetch("https://formspree.io/f/xqewleog",{
        method:"POST",
        headers:{"Content-Type":"application/json","Accept":"application/json"},
        body:JSON.stringify(payload)
      });
    }catch(e){}

    location.href="sq_done.html";
  }
</script>
</body></html>
