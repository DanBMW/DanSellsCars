<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DanSells | Cash budget</title><link rel="stylesheet" href="style.css"/></head>
<body><div class="app"><div class="shell">
  <div class="topbar">
    <div class="brand"><span class="brand-name">DanSells</span><span class="brand-sub">Powered by BMW Ruxley</span></div>
    <div class="meta"><span class="dot"></span><span>Step 5 of 11</span></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-row"><span>Step 5 of 11</span><span>Under 2 minutes</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:45%"></div></div>
  </div>
<div class="step-wrap">
  <div class="step-kicker">Total budget</div>
  <h2>What overall budget are you aiming to stay within?</h2>
  <p class="step-desc">This gives Dan the guardrails to shortlist the right models first.</p>
  <div class="input-card">
    <div class="range-display"><span class="range-label">Total budget</span><strong id="cv">£35,000</strong></div>
    <input type="range" id="cr" min="10000" max="150000" step="1000" value="35000" oninput="document.getElementById('cv').textContent='£'+Number(this.value).toLocaleString('en-GB')"/>
    <p class="hint">A guide figure is all Dan needs at this stage.</p>
  </div>
  <div class="nav">
    <a class="btn-ghost" href="step3.html">&larr; Back</a>
    <button class="btn" onclick="go()">Continue &rarr;</button>
  </div>
</div></div></div>
<script>
  const s=sessionStorage.getItem("cashBudget"); if(s){ document.getElementById("cr").value=s; document.getElementById("cv").textContent="£"+Number(s).toLocaleString("en-GB"); }
  function go(){ sessionStorage.setItem("cashBudget",document.getElementById("cr").value); window.location.href="step4c.html"; }
</script></body></html>
