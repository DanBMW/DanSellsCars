<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DanSells | Timing</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app"><div class="shell">

  <div class="topbar">
    <div class="brand">
      <span class="brand-name">DanSells</span>
      <span class="brand-sub">Powered by BMW Ruxley</span>
    </div>
    <div class="meta"><span class="dot"></span><span>Step 2 of 10</span></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-row"><span>Step 2 of 10</span><span>Under 2 minutes</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:20%"></div></div>
  </div>
<div class="step-wrap">
  <div class="step-kicker">Timing</div>
  <h2>When are you looking to change?</h2>
  <p class="step-desc">This tells Dan how to prioritise your follow-up and what stock to look at first.</p>
  <div class="grid">
    <button class="choice" data-val="Right now if the deal is right" onclick="pick(this)">
      <span class="choice-emoji">🔥</span>
      <span class="choice-title">Right now</span>
      <span class="choice-desc">I would change today if the deal is right.</span>
    </button>
    <button class="choice" data-val="Within 1 month" onclick="pick(this)">
      <span class="choice-emoji">📅</span>
      <span class="choice-title">Within 1 month</span>
      <span class="choice-desc">Actively looking, want to move soon.</span>
    </button>
    <button class="choice" data-val="1 to 3 months" onclick="pick(this)">
      <span class="choice-emoji">⏳</span>
      <span class="choice-title">1 to 3 months</span>
      <span class="choice-desc">Planning ahead, want the right setup.</span>
    </button>
    <button class="choice" data-val="Just exploring" onclick="pick(this)">
      <span class="choice-emoji">👀</span>
      <span class="choice-title">Just exploring</span>
      <span class="choice-desc">Browsing ideas, no rush.</span>
    </button>
  </div>
  <div class="nav">
    <a class="btn-ghost" href="step1.html">&larr; Back</a>
    <button class="btn" onclick="goNext()">Continue &rarr;</button>
  </div>
</div>
</div></div>
<script>
  let chosen = sessionStorage.getItem("timeline") || "";
  document.querySelectorAll(".choice").forEach(b => {
    if(b.dataset.val === chosen) b.classList.add("selected");
  });
  function pick(btn){
    document.querySelectorAll(".choice").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    chosen = btn.dataset.val;
    sessionStorage.setItem("timeline", chosen);
    setTimeout(()=>window.location.href="step3.html", 200);
  }
  function goNext(){
    if(!chosen){ alert("Let Dan know your rough timing."); return; }
    window.location.href="step3.html";
  }
</script>
</body></html>
